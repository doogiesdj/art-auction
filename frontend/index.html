<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArtAuction — 한국 미술품 경매</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav-container">
      <a href="#/" class="site-logo">
        <span class="logo-en">ArtAuction</span>
        <span class="logo-ko">한국 미술품 경매</span>
      </a>
      <ul class="nav-menu">
        <li><a href="#/auctions" class="nav-item">경매</a></li>
        <li><a href="#/artworks" class="nav-item">작품</a></li>
        <li><a href="#/artists" class="nav-item">작가</a></li>
        <li><a href="#/search" class="nav-item nav-search">AI 검색</a></li>
      </ul>
    </nav>
  </header>

  <main id="app-root" class="main-content">
    <div class="page-loading">
      <div class="loading-spinner"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="footer-logo-en">ArtAuction</span>
        <span class="footer-logo-ko">한국 미술품 경매</span>
      </div>
      <p class="footer-desc">Apache Jena Fuseki · OWL 온톨로지 · GraphRAG 시맨틱 검색</p>
      <p class="footer-copy">&copy; 2026 ArtAuction. 지식 그래프 기반 미술품 경매 플랫폼.</p>
    </div>
  </footer>

  <div id="toast-container"></div>

  <div id="bid-modal" class="modal-backdrop hidden">
    <div class="modal-dialog">
      <div class="modal-header">
        <h3 id="modal-title">입찰하기</h3>
        <button class="modal-close-btn" onclick="closeBidModal()">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
